<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTEX TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-main: #06090f;
            --bg-sidebar: #0a0e17;
            --bg-card: #0d121d;
            --accent-cyan: #00f2ff;
            --accent-purple: #b165fb;
            --text-main: #e0e6ed;
            --text-dim: #64748b;
            --bullish: #00ff88;
            --bearish: #ff4444;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .mono { font-family: 'JetBrains+Mono', monospace; }

        /* CRYPTEX Glass Effect */
        .cryptex-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .sidebar-item.active {
            color: var(--accent-cyan);
            background: linear-gradient(90deg, rgba(0, 242, 255, 0.08) 0%, transparent 100%);
            border-left: 3px solid var(--accent-cyan);
        }

        /* Gradient Borders from Screenshots */
        .card-btc { border-top: 2px solid #f7931a; }
        .card-eth { border-top: 2px solid #627eea; }
        .card-sol { border-top: 2px solid #14f195; }

        .signal-top {
            background: linear-gradient(135deg, rgba(13, 18, 29, 1) 0%, rgba(26, 34, 50, 1) 100%);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .signal-badge-buy { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.2); }
        .signal-badge-sell { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.2); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1a2030; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setTab] = useState('terminal');
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());
            const [data, setData] = useState({ sentiment: [], signals: [], prices: [] });

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date().toLocaleTimeString()), 1000);
                const fetchData = async () => {
                    const [sent, sig] = await Promise.all([
                        axios.get('/api/sentiment'),
                        axios.get('/api/signals')
                    ]);
                    setData({ sentiment: sent.data, signals: sig.data });
                };
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => { clearInterval(timer); clearInterval(interval); };
            }, []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, data]);

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-[#06090f]">
                    {/* Sidebar */}
                    <div className="w-64 bg-[#0a0e17] border-r border-white/5 flex flex-col pt-8">
                        <div className="px-8 mb-12">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-cyan-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                                    <i data-lucide="zap" className="text-black w-6 h-6 fill-current"></i>
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-2xl tracking-tighter text-white">CRYPTEX</h1>
                                    <p className="text-[9px] text-cyan-500/50 uppercase font-black tracking-[0.3em]">Trading Terminal</p>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 space-y-1">
                            {[
                                { id: 'terminal', icon: 'layout-grid', label: 'Terminal' },
                                { id: 'predictions', icon: 'brain', label: 'Predictions' },
                                { id: 'signals', icon: 'activity', label: 'Signals' },
                                { id: 'whales', icon: 'waves', label: 'Whales' },
                                { id: 'sentiment', icon: 'message-circle', label: 'Sentiment' }
                            ].map(item => (
                                <div 
                                    key={item.id} 
                                    onClick={() => setTab(item.id)}
                                    className={`sidebar-item px-8 py-4 flex items-center gap-4 cursor-pointer transition-all ${activeTab === item.id ? 'active' : 'text-slate-500 hover:text-white'}`}
                                >
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="text-sm font-bold tracking-wide uppercase">{item.label}</span>
                                </div>
                            ))}
                        </nav>

                        <div className="p-8 border-t border-white/5">
                            <div className="flex items-center gap-3 text-[10px] font-black text-green-500 uppercase tracking-widest">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
                                System Online
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        {/* Header */}
                        <header className="h-20 px-10 flex justify-between items-center border-b border-white/5 bg-[#0a0e17]/80 backdrop-blur-xl">
                            <div>
                                <h2 className="text-xl font-black text-white uppercase tracking-widest flex items-center gap-3">
                                    {activeTab} <span className="text-cyan-400">Terminal</span>
                                </h2>
                                <div className="flex items-center gap-4 mt-1">
                                    <span className="text-[10px] font-bold text-slate-500 flex items-center gap-1">
                                        <i data-lucide="clock" className="w-3 h-3"></i> {currentTime}
                                    </span>
                                    <span className="text-[10px] font-bold text-green-500/70 flex items-center gap-1">
                                        <i data-lucide="wifi" className="w-3 h-3"></i> CONNECTED
                                    </span>
                                </div>
                            </div>
                            <button className="flex items-center gap-2 px-5 py-2.5 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-[11px] font-black uppercase tracking-widest">
                                <i data-lucide="refresh-cw" className="w-3.5 h-3.5"></i> Refresh
                            </button>
                        </header>

                        {/* Scrolling Content */}
                        <div className="flex-1 overflow-y-auto p-10 space-y-10 custom-scrollbar">
                            
                            {/* Top Ticker Grid */}
                            <div className="grid grid-cols-8 gap-4">
                                {[
                                    { s: 'BTC', p: '68,534.00', c: '+3.21%' },
                                    { s: 'ETH', p: '2,134.07', c: '+5.37%' },
                                    { s: 'SOL', p: '83.45', c: '+2.04%' },
                                    { s: 'ADA', p: '0.2479', c: '+2.82%' },
                                    { s: 'AVAX', p: '9.20', c: '+5.15%' },
                                    { s: 'DOT', p: '1.28', c: '+3.21%' },
                                    { s: 'MATIC', p: '0.0000', c: '0.00%' },
                                    { s: 'LINK', p: '14.20', c: '+1.12%' }
                                ].map(coin => (
                                    <div key={coin.s} className="cryptex-card p-4 flex flex-col gap-1 hover:border-cyan-500/30 cursor-pointer transition-all border-t-2 border-cyan-500/20">
                                        <div className="flex justify-between items-center text-[10px] font-black">
                                            <span className="text-white opacity-60 tracking-wider">{coin.s}</span>
                                            <span className="text-green-400">{coin.c}</span>
                                        </div>
                                        <div className="text-md font-extrabold text-white mono">${coin.p}</div>
                                        <div className="text-[8px] text-slate-600 font-bold uppercase">Vol $56.17B</div>
                                    </div>
                                ))}
                            </div>

                            {/* Main Dashboard Grid */}
                            <div className="grid grid-cols-12 gap-8">
                                {/* Left Section: Chart + Heatmap */}
                                <div className="col-span-8 space-y-8">
                                    {/* Advanced Chart */}
                                    <div className="cryptex-card p-8">
                                        <div className="flex justify-between items-end mb-8">
                                            <div>
                                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-1">Price Chart</h3>
                                                <div className="text-2xl font-black text-white">Bitcoin (BTC)</div>
                                            </div>
                                            <div className="flex gap-2 bg-black/40 p-1 rounded-lg border border-white/5">
                                                {['24H', '7D', '30D', '90D'].map(t => (
                                                    <button key={t} className={`px-4 py-1.5 rounded-md text-[10px] font-black ${t==='7D' ? 'bg-cyan-500 text-black shadow-[0_0_10px_rgba(0,242,255,0.4)]' : 'text-slate-500 hover:text-white'}`}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div id="main-chart" className="w-full h-[350px]"></div>
                                    </div>

                                    {/* Sentiment Heatmap */}
                                    <div className="cryptex-card p-8">
                                        <div className="flex justify-between items-center mb-8">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Sentiment Heatmap</h3>
                                            <div className="flex gap-4 text-[9px] font-black uppercase">
                                                <span className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-red-500"></div> Bearish</span>
                                                <span className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-yellow-500"></div> Neutral</span>
                                                <span className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-green-500"></div> Bullish</span>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-4 gap-4">
                                            {data.sentiment.map(s => (
                                                <div key={s.symbol} className={`p-5 rounded-xl border-l-4 ${s.score > 60 ? 'bg-green-500/5 border-green-500/40' : s.score < 40 ? 'bg-red-500/5 border-red-500/40' : 'bg-yellow-500/5 border-yellow-500/40'}`}>
                                                    <div className="flex justify-between text-[10px] font-black text-white/40 mb-1">
                                                        <span>{s.symbol}</span>
                                                        <i data-lucide="twitter" className="w-3 h-3"></i>
                                                    </div>
                                                    <div className="text-3xl font-black text-white mono">{s.score}</div>
                                                    <div className={`text-[9px] font-black uppercase tracking-widest ${s.score > 60 ? 'text-green-400' : s.score < 40 ? 'text-red-400' : 'text-yellow-400'}`}>{s.label}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Right Section: Signals */}
                                <div className="col-span-4 space-y-8">
                                    <div className="flex items-center gap-2 mb-2">
                                        <i data-lucide="zap" className="w-4 h-4 text-cyan-400 fill-current"></i>
                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Top Signal</h3>
                                    </div>

                                    {/* Top Signal Card */}
                                    <div className="cryptex-card p-6 border border-cyan-500/20 bg-gradient-to-br from-[#0d121d] to-[#161b2e]">
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="flex gap-4 items-center">
                                                <div className="w-12 h-12 rounded-xl bg-red-500/10 flex items-center justify-center border border-red-500/20 text-red-500">
                                                    <i data-lucide="arrow-down" className="w-6 h-6"></i>
                                                </div>
                                                <div>
                                                    <h4 className="text-xl font-black text-white">SOL <span className="text-red-500">SELL</span></h4>
                                                    <p className="text-[9px] text-slate-500 font-bold uppercase tracking-wider">1h Timeframe</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-3xl font-black text-white">69%</div>
                                                <div className="text-[9px] text-slate-500 font-bold uppercase">Confidence</div>
                                            </div>
                                        </div>
                                        <p className="text-xs text-slate-400 leading-relaxed mb-8 font-medium">
                                            Bearish sentiment (36%) • ML model predicts downward movement
                                        </p>
                                        <div className="grid grid-cols-3 gap-2 py-4 border-t border-white/5">
                                            <div className="text-center">
                                                <div className="text-[8px] text-slate-600 font-black uppercase mb-1">Entry</div>
                                                <div className="text-xs font-bold text-white">$83.45</div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-[8px] text-slate-600 font-black uppercase mb-1">Target</div>
                                                <div className="text-xs font-bold text-green-400">$80.95</div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-[8px] text-slate-600 font-black uppercase mb-1">Stop Loss</div>
                                                <div className="text-xs font-bold text-red-400">$85.12</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* All Signals List */}
                                    <div className="space-y-4">
                                        <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">All Signals</h3>
                                        {data.signals.map((sig, i) => (
                                            <div key={i} className="cryptex-card p-4 flex items-center gap-4 hover:bg-white/5 transition-all cursor-pointer group">
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${sig.signal_type === 'BUY' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                                    <i data-lucide={sig.signal_type === 'BUY' ? 'arrow-up-right' : 'arrow-down-right'} className="w-4 h-4"></i>
                                                </div>
                                                <div className="flex-1">
                                                    <div className="flex justify-between items-center mb-0.5">
                                                        <span className="text-xs font-black text-white uppercase group-hover:text-cyan-400 transition-colors">{sig.symbol} {sig.signal_type}</span>
                                                        <span className="text-[14px] font-black text-white/80">{(sig.confidence*100).toFixed(0)}%</span>
                                                    </div>
                                                    <p className="text-[9px] text-slate-500 font-bold uppercase truncate max-w-[150px]">
                                                        {JSON.parse(sig.reasoning)[0]}
                                                    </p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // Render with delay for Chart Initialization
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Chart Loader Helper
        setTimeout(() => {
            const chartDiv = document.getElementById('main-chart');
            if(chartDiv) {
                const chart = LightweightCharts.createChart(chartDiv, {
                    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#64748b' },
                    grid: { vertLines: { color: 'rgba(42, 46, 57, 0.1)' }, horzLines: { color: 'rgba(42, 46, 57, 0.1)' } },
                    width: chartDiv.clientWidth,
                    height: 350,
                    timeScale: { borderColor: 'rgba(255,255,255,0.05)' },
                    rightPriceScale: { borderColor: 'rgba(255,255,255,0.05)' }
                });
                const candleSeries = chart.addCandlestickSeries({ upColor: '#00ff88', downColor: '#ff4444', borderVisible: false, wickUpColor: '#00ff88', wickDownColor: '#ff4444' });
                axios.get('/api/prices/BTC').then(res => {
                    candleSeries.setData(res.data);
                    chart.timeScale().fitContent();
                });
            }
        }, 1000);
    </script>
</body>
</html>
